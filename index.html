var xyToNode = {};
NODE_LIST.forEach(function(n,i) {
  var x = Math.round(POS_DATA[n][0]*1e6)/1e6;
  var y = Math.round(POS_DATA[n][1]*1e6)/1e6;
  xyToNode[x+','+y] = i;
});

var tooltipPinned = false;

function showNode(pt, event) {
  var xr=Math.round(pt.x*1e6)/1e6, yr=Math.round(pt.y*1e6)/1e6;
  var idx=xyToNode[xr+','+yr];
  if (idx===undefined) return false;
  var d=NODE_DATA[String(idx)];
  if (!d) return false;
  ttRegion.textContent = d.region;
  ttCount.textContent  = 'Populations: '+d.pops.length;
  ttList.innerHTML = d.pops.map(p=>'<div>'+p+'</div>').join('');
  tooltip.style.borderColor = REGION_COLORS_MAP[d.region]||'rgba(255,255,255,0.15)';
  tooltip.style.display='block';
  positionTooltip(event);
  return true;
}

plotDiv.on('plotly_hover',function(data) {
  if (tooltipPinned) return;
  var pt=data.points[0]; if(pt.x===undefined) return;
  showNode(pt, data.event);
});
plotDiv.on('plotly_unhover',function() { if(!tooltipPinned) hideTooltip(); });
plotDiv.on('plotly_click',function(data) {
  var pt=data.points[0]; if(pt.x===undefined) return;
  if (tooltipPinned) { tooltipPinned=false; hideTooltip(); }
  else { if(showNode(pt,data.event)) tooltipPinned=true; }
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ tooltipPinned=false; hideTooltip(); } });
document.addEventListener('mousemove',e=>{ if(tooltip.style.display==='block'&&!tooltipPinned) positionTooltip(e); });
function hideTooltip() { tooltip.style.display='none'; tooltipPinned=false; }
function positionTooltip(e) {
  var x=e.clientX+16, y=e.clientY+16;
  var w=tooltip.offsetWidth||280, h=tooltip.offsetHeight||200;
  if(x+w>window.innerWidth-10)  x=e.clientX-w-16;
  if(y+h>window.innerHeight-10) y=e.clientY-h-16;
  tooltip.style.left=x+'px'; tooltip.style.top=y+'px';
}

// ── Canvas helpers ────────────────────────────────────────────────────────
function hexToRgba(hex, a) {
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function drawGlowNode(ctx, x, y, b, color) {
  var baseR = 3 + b * 14;
  var halos = [
  [4.00, 0.006],
  [3.25, 0.010],
  [2.60, 0.016],
  [2.00, 0.024],
  [1.50, 0.034],
  [1.10, 0.048],
  [0.85, 0.065],
  [0.65, 0.088],
  [0.53, 0.115],
  [0.40, 0.150],
];
  for (var h=0; h<halos.length; h++) {
    ctx.beginPath();
    ctx.arc(x, y, baseR*halos[h][0], 0, Math.PI*2);
    ctx.fillStyle = hexToRgba(color, halos[h][1]);
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(x, y, baseR, 0, Math.PI*2);
  ctx.fillStyle = hexToRgba(color, 0.92);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, baseR*0.38, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.fill();
}

function drawDimNode(ctx, x, y, b, color) {
  var baseR = 8 + b * 28;
  ctx.beginPath();
  ctx.arc(x, y, baseR*0.55, 0, Math.PI*2);
  ctx.fillStyle = hexToRgba(color, 0.08);
  ctx.fill();
}

function drawPanel(ctx, region) {
  var color = COLORS_L[region];

  // Background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, PANEL, PANEL);

  // Edges
  for (var e=0; e<EDGES_C.length; e++) {
    var src=NODES_C[EDGES_C[e].s], tgt=NODES_C[EDGES_C[e].t];
    var hi = src.r===region || tgt.r===region;
    ctx.beginPath();
    ctx.moveTo(src.x, src.y);
    ctx.lineTo(tgt.x, tgt.y);
    ctx.strokeStyle = hi ? 'rgba(255,255,255,0.30)' : 'rgba(255,255,255,0.04)';
    ctx.lineWidth   = hi ? 2.5 : 0.8;
    ctx.stroke();
  }

  // Dim nodes
  for (var i=0; i<NODES_C.length; i++) {
    var nd=NODES_C[i];
    if (nd.r===region) continue;
    drawDimNode(ctx, nd.x, nd.y, nd.b, COLORS_L[nd.r]||'#888');
  }

  // Bright nodes
  for (var i=0; i<NODES_C.length; i++) {
    var nd=NODES_C[i];
    if (nd.r!==region) continue;
    drawGlowNode(ctx, nd.x, nd.y, nd.b, color);
  }

  // Label
  ctx.font = 'bold 72px monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(region, PANEL/2, PANEL - 30);

  // White border
  ctx.strokeStyle = 'rgba(255,255,255,0.20)';
  ctx.lineWidth   = 8;
  ctx.strokeRect(2, 2, PANEL-4, PANEL-4);
}

// ── 9-file export ────────────────────────────────────────────────────────
document.getElementById('btn-strip').addEventListener('click', function() {
  var btn  = this;
  var prog = document.getElementById('strip-progress');
  btn.disabled=true; btn.textContent='Generating...';
  prog.style.display='block';

  var ri = 0;

  function exportNext() {
    if (ri >= REGIONS.length) {
      btn.disabled=false;
      btn.textContent='⬇ Export 9 Region PNGs';
      prog.style.display='none';
      return;
    }

    var region = REGIONS[ri];
    prog.textContent = (ri+1)+' / '+REGIONS.length+' — '+region;

    var canvas = document.createElement('canvas');
    canvas.width  = PANEL;
    canvas.height = PANEL;
    var ctx = canvas.getContext('2d');

    drawPanel(ctx, region);

    var safe = region.replace(/[^a-z0-9]/gi, '_');
    var a    = document.createElement('a');
    a.download = 'g25_tda_'+String(ri+1).padStart(2,'0')+'_'+safe+'.png';
    a.href = canvas.toDataURL('image/png');
    a.click();

    ri++;
    setTimeout(exportNext, 500);
  }

  setTimeout(exportNext, 50);
});
</script>
